name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        shell: bash
        run: |
          rustup target add ${{ matrix.target }}

      - name: Install cross linker (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TARGET="${{ matrix.target }}"
          NAME="cc-stats-${TAG}-${TARGET}"
          mkdir "$NAME"
          cp "target/${TARGET}/release/cc-stats" "$NAME/"
          cp README.md LICENSE "$NAME/" 2>/dev/null || true
          tar -czf "${NAME}.tar.gz" "$NAME"
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-stats-${{ matrix.target }}
          path: |
            cc-stats-*-${{ matrix.target }}.tar.gz
            cc-stats-*-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create / update GitHub release via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Create release if missing, else edit (idempotent)
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG exists, uploading additional assets"
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber \
            dist/cc-stats-*.tar.gz \
            dist/cc-stats-*.tar.gz.sha256
